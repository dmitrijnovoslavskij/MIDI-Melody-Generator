<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI Gen</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  :root {
    --bg: #0e0e12;
    --surface: #17171f;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --accent: #7c5cfc;
    --accent2: #c084fc;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --text: #e2e2f0;
    --muted: #6b6b88;
    --piano-white: #ddd8f0;
    --piano-black: #1a1a24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--accent2);
    text-transform: uppercase;
  }
  .version { color: var(--muted); font-size: 10px; }
  .header-spacer { flex: 1; }
  .status-pill {
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 10px;
    letter-spacing: 0.08em;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all .3s;
  }
  .status-pill.playing { border-color: var(--green); color: var(--green); }
  .status-pill.generating { border-color: var(--amber); color: var(--amber); }

  /* ── Layout ── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 6px;
  }
  .row.three { grid-template-columns: 1fr 1fr 1fr; }
  .row.single { grid-template-columns: 1fr; }

  .param {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .param label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .param select, .param input[type=number] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    padding: 4px 6px;
    font-family: inherit;
    font-size: 11px;
    width: 100%;
    cursor: pointer;
    transition: border-color .2s;
  }
  .param select:hover, .param input[type=number]:hover,
  .param select:focus, .param input[type=number]:focus {
    border-color: var(--accent);
    outline: none;
  }

  /* Slider */
  .param input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    border: 1px solid var(--border);
    cursor: pointer;
    margin-top: 2px;
  }
  .param input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .param .val-display {
    font-size: 10px;
    color: var(--accent2);
    text-align: right;
    margin-top: -2px;
  }

  /* Toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .toggle-row label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .toggle {
    position: relative;
    width: 30px; height: 16px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    cursor: pointer;
    transition: background .2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--muted);
    top: 2px; left: 2px;
    transition: transform .2s, background .2s;
  }
  .toggle input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
  .toggle input:checked + .toggle-track::after { transform: translateX(14px); background: white; }

  /* ─ Main area ─ */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Piano roll */
  .piano-roll-container {
    flex: 1;
    background: var(--bg);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .roll-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .roll-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .track-tabs {
    display: flex;
    gap: 4px;
  }
  .track-tab {
    padding: 3px 10px;
    border-radius: 3px;
    font-size: 10px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    letter-spacing: 0.06em;
    transition: all .2s;
  }
  .track-tab.active { background: var(--accent); border-color: var(--accent); color: white; }

  .roll-canvas-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  canvas#rollCanvas {
    display: block;
  }

  /* ── Transport ── */
  .transport {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .btn {
    padding: 6px 16px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .15s;
    text-transform: uppercase;
  }
  .btn-generate {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    min-width: 100px;
  }
  .btn-generate:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-play {
    background: transparent;
    color: var(--green);
    border-color: var(--green);
    width: 72px;
  }
  .btn-play:hover { background: rgba(74,222,128,.1); }
  .btn-stop {
    background: transparent;
    color: var(--red);
    border-color: var(--red);
  }
  .btn-stop:hover { background: rgba(248,113,113,.1); }
  .btn-download {
    background: transparent;
    color: var(--muted);
    border-color: var(--border);
  }
  .btn-download:hover { color: var(--text); border-color: var(--muted); }

  .transport-info {
    display: flex;
    gap: 16px;
    margin-left: 8px;
  }
  .info-chip {
    font-size: 10px;
    color: var(--muted);
  }
  .info-chip span { color: var(--accent2); font-weight: 600; }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width .1s linear;
    border-radius: 2px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 11px;
    color: var(--text);
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 99;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Placeholder */
  .roll-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    pointer-events: none;
  }
  .roll-placeholder .big { font-size: 32px; margin-bottom: 4px; }

  .arp-section { display: none; }
  .arp-section.visible { display: block; }
</style>
</head>
<body>

<header>
  <h1>MIDI Gen</h1>
  <span class="version">v2.0</span>
  <div class="header-spacer"></div>
  <div class="status-pill" id="statusPill">IDLE</div>
</header>

<div class="workspace">
  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <!-- HARMONY -->
    <div class="section">
      <div class="section-label">Harmony</div>
      <div class="row">
        <div class="param">
          <label>Key</label>
          <select id="p_key"></select>
        </div>
        <div class="param">
          <label>Mode / Scale</label>
          <select id="p_mode"></select>
        </div>
      </div>
      <div class="row single">
        <div class="param">
          <label>Chord Progression</label>
          <select id="p_progression"></select>
        </div>
      </div>
      <div class="row">
        <div class="param">
          <label>Voicing</label>
          <select id="p_chord_voicing"></select>
        </div>
        <div class="param">
          <label>Min Interval</label>
          <input type="number" id="p_chord_min_interval" min="0" max="12" value="0">
        </div>
      </div>
    </div>

    <!-- TEMPO & STRUCTURE -->
    <div class="section">
      <div class="section-label">Tempo & Structure</div>
      <div class="row">
        <div class="param">
          <label>BPM</label>
          <input type="number" id="p_bpm" min="40" max="220" value="90">
        </div>
        <div class="param">
          <label>Bars</label>
          <input type="number" id="p_bars" min="2" max="32" value="8">
        </div>
      </div>
    </div>

    <!-- MELODY -->
    <div class="section">
      <div class="section-label">Melody</div>
      <div class="row">
        <div class="param">
          <label>Rhythm</label>
          <select id="p_melody_rhythm"></select>
        </div>
        <div class="param">
          <label>Max Jump</label>
          <input type="number" id="p_melody_max_jump" min="1" max="7" value="3">
        </div>
      </div>
      <div class="param" style="margin-bottom:6px">
        <label>Chord Tone Prob <span class="val-display" id="v_chord_prob">0.55</span></label>
        <input type="range" id="p_melody_chord_prob" min="0" max="100" value="55"
               oninput="document.getElementById('v_chord_prob').textContent=(this.value/100).toFixed(2)">
      </div>
      <div class="param" style="margin-bottom:6px">
        <label>Leap Prob <span class="val-display" id="v_leap_prob">0.10</span></label>
        <input type="range" id="p_melody_leap_prob" min="0" max="50" value="10"
               oninput="document.getElementById('v_leap_prob').textContent=(this.value/100).toFixed(2)">
      </div>
      <div class="row">
        <div class="param">
          <label>Octave Low (MIDI)</label>
          <input type="number" id="p_melody_octave_lo" min="36" max="72" value="60">
        </div>
        <div class="param">
          <label>Octave High (MIDI)</label>
          <input type="number" id="p_melody_octave_hi" min="48" max="96" value="84">
        </div>
      </div>
      <div class="row">
        <div class="param">
          <label>Velocity</label>
          <input type="number" id="p_melody_velocity" min="40" max="110" value="82">
        </div>
        <div class="param">
          <label>Vel Variance</label>
          <input type="number" id="p_melody_vel_var" min="0" max="30" value="12">
        </div>
      </div>
      <div class="toggle-row">
        <label>Motif Repeat</label>
        <label class="toggle">
          <input type="checkbox" id="p_melody_motif_repeat" checked>
          <div class="toggle-track"></div>
        </label>
      </div>
    </div>

    <!-- CHORDS -->
    <div class="section">
      <div class="section-label">Chords</div>
      <div class="row">
        <div class="param">
          <label>Rhythm</label>
          <select id="p_chord_rhythm"></select>
        </div>
        <div class="param">
          <label>Velocity</label>
          <input type="number" id="p_chord_velocity" min="20" max="100" value="58">
        </div>
      </div>
    </div>

    <!-- BASS -->
    <div class="section">
      <div class="section-label">Bass</div>
      <div class="row">
        <div class="param">
          <label>Pattern</label>
          <select id="p_bass_pattern"></select>
        </div>
        <div class="param">
          <label>Vel Scale</label>
          <input type="number" id="p_bass_velocity_scale" min="0.1" max="2" step="0.1" value="1.0">
        </div>
      </div>
    </div>

    <!-- ARPEGGIO -->
    <div class="section">
      <div class="section-label">Arpeggio</div>
      <div class="toggle-row">
        <label>Enable</label>
        <label class="toggle">
          <input type="checkbox" id="p_arp_enabled"
                 onchange="document.getElementById('arpParams').classList.toggle('visible',this.checked)">
          <div class="toggle-track"></div>
        </label>
      </div>
      <div class="arp-section" id="arpParams">
        <div class="row">
          <div class="param">
            <label>Pattern</label>
            <select id="p_arp_pattern"></select>
          </div>
          <div class="param">
            <label>Note Dur</label>
            <select id="p_arp_note_dur">
              <option value="60">64th</option>
              <option value="120">32nd</option>
              <option value="240" selected>16th</option>
              <option value="480">8th</option>
              <option value="960">Quarter</option>
            </select>
          </div>
        </div>
        <div class="param" style="margin-bottom:6px">
          <label>Velocity</label>
          <input type="number" id="p_arp_velocity" min="20" max="110" value="68">
        </div>
      </div>
    </div>

  </aside>

  <!-- ── MAIN ── -->
  <div class="main">
    <div class="piano-roll-container">
      <div class="roll-header">
        <span class="roll-title">Piano Roll</span>
        <div class="track-tabs" id="trackTabs"></div>
      </div>
      <div class="roll-canvas-wrap" id="rollWrap">
        <div class="roll-placeholder" id="rollPlaceholder">
          <div class="big">♪</div>
          <div>Generate a track to see the piano roll</div>
        </div>
        <canvas id="rollCanvas"></canvas>
      </div>
    </div>

    <!-- Transport -->
    <div class="transport">
      <button class="btn btn-generate" id="btnGenerate">Generate</button>
      <button class="btn btn-play" id="btnPlay" disabled>▶ Play</button>
      <button class="btn btn-stop" id="btnStop" disabled>■ Stop</button>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="transport-info" id="transportInfo"></div>
      <button class="btn btn-download" id="btnDownload" disabled>↓ MIDI</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Options loader ─────────────────────────────────────────────────────────
async function loadOptions() {
  try {
    const r = await fetch('/options');
    const opts = await r.json();

    const fill = (id, arr, labels) => {
      const sel = document.getElementById(id);
      if (!sel) return;
      arr.forEach((v, i) => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = labels ? labels[i] : v;
        sel.appendChild(o);
      });
    };

    fill('p_key', opts.keys);
    fill('p_mode', opts.modes);
    fill('p_progression', opts.progressions);
    fill('p_chord_voicing', opts.chord_voicings);
    fill('p_melody_rhythm', opts.melody_rhythms);
    fill('p_chord_rhythm', opts.chord_rhythms);
    fill('p_bass_pattern', opts.bass_patterns);
    fill('p_arp_pattern', opts.arp_patterns);

    // Defaults
    setSelect('p_key', 'C');
    setSelect('p_mode', 'minor');
    setSelect('p_progression', 'I-V-vi-IV');
    setSelect('p_chord_voicing', 'close');
    setSelect('p_melody_rhythm', 'normal');
    setSelect('p_chord_rhythm', 'normal');
    setSelect('p_bass_pattern', 'root_fifth');
    setSelect('p_arp_pattern', 'up');
  } catch(e) {
    console.warn('Could not load options:', e);
  }
}

function setSelect(id, val) {
  const s = document.getElementById(id);
  if (!s) return;
  [...s.options].forEach(o => { if (o.value === val) o.selected = true; });
}

function getVal(id) {
  const el = document.getElementById(id);
  if (!el) return undefined;
  if (el.type === 'checkbox') return el.checked;
  if (el.type === 'range' || el.type === 'number') return parseFloat(el.value);
  return el.value;
}

function buildParams() {
  return {
    key:                   getVal('p_key'),
    mode:                  getVal('p_mode'),
    progression:           getVal('p_progression'),
    chord_voicing:         getVal('p_chord_voicing'),
    chord_min_interval:    getVal('p_chord_min_interval'),
    bpm:                   getVal('p_bpm'),
    bars:                  getVal('p_bars'),
    melody_rhythm:         getVal('p_melody_rhythm'),
    melody_max_jump:       getVal('p_melody_max_jump'),
    melody_chord_prob:     getVal('p_melody_chord_prob') / 100,
    melody_leap_prob:      getVal('p_melody_leap_prob') / 100,
    melody_octave_lo:      getVal('p_melody_octave_lo'),
    melody_octave_hi:      getVal('p_melody_octave_hi'),
    melody_motif_repeat:   getVal('p_melody_motif_repeat'),
    melody_velocity:       getVal('p_melody_velocity'),
    melody_vel_var:        getVal('p_melody_vel_var'),
    chord_rhythm:          getVal('p_chord_rhythm'),
    chord_velocity:        getVal('p_chord_velocity'),
    bass_pattern:          getVal('p_bass_pattern'),
    bass_velocity_scale:   getVal('p_bass_velocity_scale'),
    arp_enabled:           getVal('p_arp_enabled'),
    arp_pattern:           getVal('p_arp_pattern'),
    arp_note_dur:          parseInt(document.getElementById('p_arp_note_dur').value),
    arp_velocity:          getVal('p_arp_velocity'),
  };
}

// ── State ──────────────────────────────────────────────────────────────────
let currentMusic = null;
let currentFilePath = null;
let isPlaying = false;
let synths = {};
let scheduledIds = [];
let playStartTime = 0;
let totalDuration = 0;
let animFrame = null;
let activeTrack = 'melody';

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || '';
  t.style.color = color || '';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function setStatus(text, cls) {
  const p = document.getElementById('statusPill');
  p.textContent = text;
  p.className = 'status-pill' + (cls ? ' ' + cls : '');
}

// ── Generate ───────────────────────────────────────────────────────────────
document.getElementById('btnGenerate').addEventListener('click', async () => {
  stopPlayback();
  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  btn.textContent = 'Generating…';
  setStatus('GENERATING', 'generating');

  try {
    const params = buildParams();
    const r = await fetch('/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(params),
    });
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    currentMusic = data.music;
    currentFilePath = data.file;

    renderRoll(activeTrack);
    buildTrackTabs(currentMusic.tracks);
    updateTransportInfo(currentMusic);

    document.getElementById('btnPlay').disabled = false;
    document.getElementById('btnStop').disabled = false;
    document.getElementById('btnDownload').disabled = false;
    document.getElementById('rollPlaceholder').style.display = 'none';
    setStatus('READY', '');
    showToast(`${currentMusic.key} ${currentMusic.mode} · ${currentMusic.bpm} BPM`, 'var(--accent2)');
  } catch(e) {
    showToast('Error: ' + e.message, 'var(--red)');
    setStatus('ERROR', '');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate';
  }
});

// ── Track tabs ─────────────────────────────────────────────────────────────
function buildTrackTabs(tracks) {
  const container = document.getElementById('trackTabs');
  container.innerHTML = '';
  const labels = {melody: 'Melody', chord_track: 'Chords', bass: 'Bass', arp: 'Arp'};
  Object.keys(tracks).forEach(k => {
    if (!tracks[k] || !tracks[k].length) return;
    const btn = document.createElement('button');
    btn.className = 'track-tab' + (k === activeTrack ? ' active' : '');
    btn.textContent = labels[k] || k;
    btn.onclick = () => {
      activeTrack = k;
      document.querySelectorAll('.track-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderRoll(k);
    };
    container.appendChild(btn);
  });
}

function updateTransportInfo(music) {
  document.getElementById('transportInfo').innerHTML =
    `<span class="info-chip">Key <span>${music.key} ${music.mode}</span></span>` +
    `<span class="info-chip">BPM <span>${music.bpm}</span></span>` +
    `<span class="info-chip">Prog <span>${document.getElementById('p_progression').value}</span></span>`;
}

// ── Piano Roll renderer ────────────────────────────────────────────────────
const ROLL_COLORS = {
  melody:      '#7c5cfc',
  chord_track: '#4ade80',
  bass:        '#fbbf24',
  arp:         '#c084fc',
};

function renderRoll(trackKey) {
  if (!currentMusic) return;
  const track = currentMusic.tracks[trackKey];
  if (!track || !track.length) return;

  const wrap = document.getElementById('rollWrap');
  const canvas = document.getElementById('rollCanvas');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  canvas.width = W;
  canvas.height = H;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0e0e12';
  ctx.fillRect(0, 0, W, H);

  // Collect all notes to determine range
  const tpb = currentMusic.tpb;
  let minNote = 127, maxNote = 0, totalTicks = 0;

  // Build timeline of notes with absolute tick positions
  const noteEvents = [];
  let tick = 0;
  track.forEach(ev => {
    const notes = ev.notes !== undefined ? ev.notes : (ev.note !== undefined ? [ev.note] : []);
    const dur = ev.duration;
    const vel = ev.velocity;
    if (vel > 0 && notes.length > 0) {
      notes.forEach(n => {
        if (n > 0) {
          noteEvents.push({tick, note: n, dur, vel});
          if (n < minNote) minNote = n;
          if (n > maxNote) maxNote = n;
        }
      });
    }
    tick += dur;
  });
  totalTicks = tick;

  if (!noteEvents.length) return;

  // Grid lines (bar lines)
  const ticksPerBar = tpb * 4;
  const bars = Math.ceil(totalTicks / ticksPerBar);

  // Piano keys on left
  const PIANO_W = 28;
  const noteRange = Math.max(maxNote - minNote + 4, 12);
  const noteH = Math.max(4, Math.floor((H - 20) / noteRange));
  const rollW = W - PIANO_W;

  // Draw grid
  ctx.fillStyle = '#13131b';
  ctx.fillRect(PIANO_W, 0, rollW, H);

  for (let b = 0; b <= bars; b++) {
    const x = PIANO_W + (b / bars) * rollW;
    ctx.strokeStyle = b === 0 ? '#3a3a50' : '#1e1e28';
    ctx.lineWidth = b % 4 === 0 ? 1.5 : 0.5;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  // Beat grid
  for (let b = 0; b <= bars * 4; b++) {
    const x = PIANO_W + (b / (bars * 4)) * rollW;
    ctx.strokeStyle = '#181820';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  // Horizontal note lanes
  for (let i = 0; i < noteRange; i++) {
    const n = maxNote + 2 - i;
    const y = i * noteH;
    const isBlack = [1,3,6,8,10].includes(n % 12);
    ctx.fillStyle = isBlack ? '#111118' : '#14141c';
    ctx.fillRect(PIANO_W, y, rollW, noteH);
    if (i > 0) {
      ctx.strokeStyle = '#1a1a24';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(PIANO_W, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  // Draw notes
  const color = ROLL_COLORS[trackKey] || '#7c5cfc';
  noteEvents.forEach(ev => {
    const x = PIANO_W + (ev.tick / totalTicks) * rollW;
    const noteRow = maxNote + 2 - ev.note;
    const y = noteRow * noteH;
    const noteW = Math.max(2, (ev.dur / totalTicks) * rollW - 1);
    const alpha = 0.5 + (ev.vel / 127) * 0.5;

    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x, y + 1, noteW, noteH - 2, 2);
    ctx.fill();

    // Highlight top edge
    ctx.globalAlpha = alpha * 0.6;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x, y + 1, noteW, 1);
  });
  ctx.globalAlpha = 1;

  // Piano keys on left
  for (let i = 0; i < noteRange; i++) {
    const n = maxNote + 2 - i;
    const y = i * noteH;
    const isBlack = [1,3,6,8,10].includes(n % 12);
    ctx.fillStyle = isBlack ? '#1a1a26' : '#2d2d40';
    ctx.fillRect(0, y + 0.5, PIANO_W - 1, noteH - 1);
    if (noteH >= 8) {
      const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      if (n % 12 === 0) {
        ctx.fillStyle = '#6b6b88';
        ctx.font = '7px monospace';
        ctx.fillText('C' + Math.floor(n / 12 - 1), 2, y + noteH - 2);
      }
    }
  }

  // Playhead
  canvas._noteEvents = noteEvents;
  canvas._totalTicks = totalTicks;
  canvas._noteH = noteH;
  canvas._maxNote = maxNote;
  canvas._noteRange = noteRange;
  canvas._pianoW = PIANO_W;
  canvas._rollW = rollW;
}

function drawPlayhead(progress) {
  const canvas = document.getElementById('rollCanvas');
  if (!canvas._totalTicks) return;
  const ctx = canvas.getContext('2d');
  // Re-render is expensive; just draw a line overlay
  const x = canvas._pianoW + progress * canvas._rollW;
  ctx.strokeStyle = '#ff4466';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x, 0);
  ctx.lineTo(x, canvas.height);
  ctx.stroke();
}

// ── Tone.js Piano Synth ────────────────────────────────────────────────────
function makePianoSynth() {
  // Layered synth to approximate piano: fast attack, medium decay, slight reverb
  const synth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'triangle' },
    envelope: {
      attack: 0.005,
      decay: 0.3,
      sustain: 0.2,
      release: 0.8,
    },
    volume: -6,
  });
  const reverb = new Tone.Reverb({ decay: 1.2, wet: 0.18 });
  const limiter = new Tone.Limiter(-3);
  synth.connect(reverb);
  reverb.connect(limiter);
  limiter.toDestination();
  return synth;
}

function makeBassSynth() {
  const synth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sine' },
    envelope: { attack: 0.01, decay: 0.4, sustain: 0.3, release: 0.6 },
    volume: -4,
  });
  synth.toDestination();
  return synth;
}

function makeChordSynth() {
  const synth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'triangle8' },
    envelope: { attack: 0.02, decay: 0.5, sustain: 0.15, release: 1.2 },
    volume: -12,
  });
  const reverb = new Tone.Reverb({ decay: 2, wet: 0.3 });
  synth.connect(reverb);
  reverb.toDestination();
  return synth;
}

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function ticksToSeconds(ticks, bpm, tpb) {
  return (ticks / tpb) * (60 / bpm);
}

// ── Playback ───────────────────────────────────────────────────────────────
async function startPlayback() {
  if (!currentMusic) return;
  await Tone.start();
  Tone.Transport.stop();
  Tone.Transport.cancel();

  // Dispose old synths
  Object.values(synths).forEach(s => { try { s.dispose(); } catch(e){} });
  synths = {
    melody: makePianoSynth(),
    chord_track: makeChordSynth(),
    bass: makeBassSynth(),
    arp: makePianoSynth(),
  };

  const { tracks, bpm, tpb } = currentMusic;
  Tone.Transport.bpm.value = bpm;

  totalDuration = 0;

  // Schedule each track
  Object.entries(tracks).forEach(([trackKey, track]) => {
    if (!track || !track.length) return;
    const synth = synths[trackKey];
    if (!synth) return;

    let tick = 0;
    track.forEach(ev => {
      const notes = ev.notes !== undefined ? ev.notes : (ev.note !== undefined ? [ev.note] : []);
      const dur = ev.duration;
      const vel = ev.velocity;
      const startSec = ticksToSeconds(tick, bpm, tpb);
      const durSec = ticksToSeconds(dur, bpm, tpb);

      if (vel > 0 && notes.length > 0) {
        const freqs = notes.filter(n => n > 0).map(midiToFreq);
        if (freqs.length > 0) {
          const id = Tone.Transport.schedule(time => {
            synth.triggerAttackRelease(freqs, durSec * 0.92, time, vel / 127);
          }, startSec);
          scheduledIds.push(id);
        }
      }
      tick += dur;
      const endSec = ticksToSeconds(tick, bpm, tpb);
      if (endSec > totalDuration) totalDuration = endSec;
    });
  });

  // Schedule stop
  const stopId = Tone.Transport.schedule(() => {
    Tone.Transport.stop();
    isPlaying = false;
    setStatus('READY', '');
    document.getElementById('btnPlay').textContent = '▶ Play';
    document.getElementById('progressFill').style.width = '0%';
  }, totalDuration + 0.5);
  scheduledIds.push(stopId);

  playStartTime = Tone.now();
  Tone.Transport.start();
  isPlaying = true;
  setStatus('PLAYING', 'playing');
  document.getElementById('btnPlay').textContent = '‖ Pause';

  // Animate progress + playhead
  function animate() {
    if (!isPlaying) return;
    const elapsed = Tone.Transport.seconds;
    const progress = Math.min(1, elapsed / totalDuration);
    document.getElementById('progressFill').style.width = (progress * 100) + '%';
    renderRoll(activeTrack);
    drawPlayhead(progress);
    animFrame = requestAnimationFrame(animate);
  }
  cancelAnimationFrame(animFrame);
  animate();
}

function stopPlayback() {
  Tone.Transport.stop();
  Tone.Transport.cancel();
  scheduledIds = [];
  isPlaying = false;
  cancelAnimationFrame(animFrame);
  document.getElementById('btnPlay').textContent = '▶ Play';
  document.getElementById('progressFill').style.width = '0%';
  setStatus('READY', '');
  if (currentMusic) renderRoll(activeTrack);
}

document.getElementById('btnPlay').addEventListener('click', async () => {
  if (isPlaying) {
    stopPlayback();
  } else {
    await startPlayback();
  }
});

document.getElementById('btnStop').addEventListener('click', stopPlayback);

document.getElementById('btnDownload').addEventListener('click', () => {
  if (!currentFilePath) return;
  const a = document.createElement('a');
  a.href = '/download?path=' + encodeURIComponent(currentFilePath);
  a.download = '';
  a.click();
});

  if (currentFilePath && window.electronAPI) {
    e.preventDefault();
    window.electronAPI.startDrag(currentFilePath);
  }
});
document.getElementById('btnDownload').draggable = true;

window.addEventListener('resize', () => {
  if (currentMusic) renderRoll(activeTrack);
});

loadOptions();
